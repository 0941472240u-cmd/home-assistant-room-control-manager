name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Home Assistant ${{ matrix.home_assistant }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.14"
            home_assistant: "2026.3.0"
          - python: "3.14"
            home_assistant: "2026.6.4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "homeassistant==${{ matrix.home_assistant }}" pytest pytest-asyncio ruff

      - name: Lint
        run: ruff check .

      - name: Compile
        run: python -m compileall -q custom_components scripts tests

      - name: Test
        run: pytest
